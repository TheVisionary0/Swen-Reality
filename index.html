<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
</head>
<body style="background:black; color:white; text-align:center; font-family:monospace;">

<h1>Welcome.</h1>

<input type="password" id="pass" placeholder="Password">
<button onclick="go()">Enter</button>

<script>
function go() {
  if (document.getElementById("pass").value === "test") {
    window.location.href = "casefiles.html";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
