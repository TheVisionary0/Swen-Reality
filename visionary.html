<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Visionary</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      padding:0;
      background-color: black;
      font-family: 'Press Start 2P', monospace;
      color: #ff0000;
      overflow-x: hidden;
      height: 300vh; /* extra scroll space for words */
      position: relative;
    }

    /* Background eyes */
    .bg-eye {
      position: absolute;
      width: 80px;
      opacity: 0.05;
      pointer-events: none;
    }

    /* Flickering overlay */
    #flicker {
      position: fixed;
      top:0; left:0;
      width:100%;
      height:100%;
      background: rgba(255,0,0,0.05);
      pointer-events: none;
    }

    /* Glitchy words */
    .reveal-word {
      font-size: 25px;
      color: #fff;
      text-shadow: 1px 1px 2px red;
      opacity: 0;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

  <!-- Background eyes -->
  <img src="eye.png" class="bg-eye" style="top:10%; left:5%;">
  <img src="eye.png" class="bg-eye" style="top:30%; left:70%;">
  <img src="eye.png" class="bg-eye" style="top:60%; left:20%;">
  <img src="eye.png" class="bg-eye" style="top:80%; left:50%;">
  <img src="eye.png" class="bg-eye" style="top:40%; left:85%;">

  <div id="flicker"></div>

  <!-- Reveal words -->
  <div id="revealArea">
    <span class="reveal-word" style="top:20%;">I'm not who you think I am.</span>
    <span class="reveal-word" style="top:35%;">I'm the one who has always been watching.</span>
    <span class="reveal-word" style="top:50%;">They think they're in control.</span>
    <span class="reveal-word" style="top:65%;">The observer.</span>
    <span class="reveal-word" style="top:80%;">The creator.</span>
    <span class="reveal-word" style="top:95%;">They all play thier roles well, but none of them see me.</span>
    <span class="reveal-word" style="top:110%;">Not even him.</span>
    <span class="reveal-word" style="top:125%;">Especially not him.</span>
  </div>

  <script>
    const eyes = document.querySelectorAll('.bg-eye');
    const flicker = document.getElementById('flicker');
    const words = document.querySelectorAll('.reveal-word');

    // Hardcore glitch interval
    setInterval(() => {
      // Move each word slightly for glitch effect
      words.forEach(word => {
        const x = Math.floor(Math.random()*20 - 10);
        const y = Math.floor(Math.random()*10 - 5);
        const r = Math.floor(Math.random()*255);
        const g = Math.floor(Math.random()*255);
        const b = Math.floor(Math.random()*255);
        word.style.transform = `translateX(${x}px) translateY(${y}px) translateX(-50%)`;
        word.style.textShadow = `${Math.floor(Math.random()*5-2)}px ${Math.floor(Math.random()*5-2)}px rgb(${r},${g},${b})`;
      });

      // Random eye jumps
      eyes.forEach(eye => {
        eye.style.top = `${Math.floor(Math.random()*90)}%`;
        eye.style.left = `${Math.floor(Math.random()*90)}%`;
      });

      // Flickering overlay
      flicker.style.background = `rgba(255,0,0,${Math.random()*0.2})`;
    }, 100);

    // Scroll reveal words
    window.addEventListener('scroll', () => {
      const scrollPos = window.scrollY + window.innerHeight / 1.5; // middle of viewport
      words.forEach(word => {
        const wordTop = word.offsetTop;
        if(scrollPos > wordTop){
          word.style.opacity = 1;
        }
      });
    });

    // Optional: static audio
    const audio = new Audio('creepy_static.mp3');
    audio.loop = true;
    audio.volume = 0.3;
    audio.play();
  </script>

</body>
</html>
