<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facility Floor Plans</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      padding:0;
      background-color: black;
      font-family: 'Press Start 2P', monospace;
      overflow-x: hidden;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 30px;
      color: red;
      text-shadow: 1px 1px 2px white;
    }

    .floorplan {
      margin: 50px auto;
      width: 80%;
      max-width: 800px;
      position: relative;
      transition: transform 0.2s;
    }

    /* Slight glitch on hover */
    .floorplan:hover {
      transform: translate(2px, -2px);
      filter: hue-rotate(10deg);
    }

    /* Background eyes */
    .bg-eye {
      position: absolute;
      width: 50px;
      opacity: 0.05;
      pointer-events: none;
      transition: all 0.3s;
    }
  </style>
</head>
<body>

  <h1>Facility Floor Plans</h1>

  <!-- Floor plan images -->
  <img src="floorplan1.png" class="floorplan" alt="Floor Plan 1">
  <img src="floorplan2.png" class="floorplan" alt="Floor Plan 2">
  <img src="floorplan3.png" class="floorplan" alt="Floor Plan 3">

  <!-- Floating eyes -->
  <img src="eye.png" class="bg-eye" style="top:10%; left:5%;">
  <img src="eye.png" class="bg-eye" style="top:50%; left:70%;">
  <img src="eye.png" class="bg-eye" style="top:80%; left:30%;">
  <img src="eye.png" class="bg-eye" style="top:30%; left:50%;">

  <script>
    // Slight random movement for eyes
    const eyes = document.querySelectorAll('.bg-eye');
    setInterval(() => {
      eyes.forEach(eye => {
        const top = parseFloat(eye.style.top);
        const left = parseFloat(eye.style.left);
        eye.style.top = `${top + (Math.random()*2-1)}%`;
        eye.style.left = `${left + (Math.random()*2-1)}%`;
      });
    }, 300);

    // Optional: slight random glitch for floor plans
    const plans = document.querySelectorAll('.floorplan');
    setInterval(() => {
      plans.forEach(plan => {
        const x = Math.random()*2-1;
        const y = Math.random()*2-1;
        plan.style.transform = `translate(${x}px, ${y}px)`;
      });
    }, 200);
  </script>

</body>
</html>
