<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facility Floor Plans</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      padding:0;
      background-color: black;
      font-family: 'Press Start 2P', monospace;
      overflow-x: hidden;
      color: white;
      text-align: center;
      position: relative;
    }

    h1 {
      margin-top: 20px;
      font-size: 30px;
      color: red;
      text-shadow: 1px 1px 2px white;
    }

    .floorplan {
      margin: 50px auto;
      width: 80%;
      max-width: 800px;
      cursor: pointer;
      position: relative;
    }

    /* MANY BACKGROUND EYES */
    .bg-eye {
      position: absolute;
      pointer-events: none;
      transition: all 0.3s;
    }

    /* Popup */
    #popup {
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%, -50%);
      display: none;
      background: rgba(0,0,0,0.95);
      padding: 10px;
      border: 2px solid red;
      z-index: 10;
    }

    #popup img {
      width: 90vw;
      max-width: 900px;
      cursor: pointer;
    }

    #closePopup {
      position: absolute;
      top:5px;
      right:10px;
      font-size: 18px;
      color: red;
      font-weight: bold;
      cursor: pointer;
    }

    /* Glitch animation */
    @keyframes glitch {
      0% { transform: translate(0,0); }
      25% { transform: translate(-3px,2px); }
      50% { transform: translate(3px,-2px); }
      75% { transform: translate(-2px,1px); }
      100% { transform: translate(0,0); }
    }

    /* FINAL EYE (hidden at first) */
    #finalEye {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      opacity: 0;
      cursor: pointer;
      transition: opacity 1s;
    }

    #finalEye.show {
      opacity: 0.8;
      animation: glitch 0.2s infinite;
    }

  </style>
</head>
<body>

  <h1>Facility Floor Plans</h1>

  <!-- Floor plans -->
  <img src="floorplan1.png" class="floorplan" onclick="openPopup(this, 1)">
  <img src="floorplan2.png" class="floorplan" onclick="openPopup(this, 2)">
  <img src="floorplan3.png" class="floorplan" onclick="openPopup(this, 3)">

  <!-- MANY EYES -->
  <script>
    const eyeCount = 25; // MORE EYES 🔥
    for(let i = 0; i < eyeCount; i++){
      const eye = document.createElement("img");
      eye.src = "eye.png";
      eye.className = "bg-eye";
      eye.style.top = Math.random()*100 + "%";
      eye.style.left = Math.random()*100 + "%";
      eye.style.width = (30 + Math.random()*70) + "px";
      eye.style.opacity = 0.05 + Math.random()*0.25;
      document.body.appendChild(eye);
    }
  </script>

  <!-- Popup -->
  <div id="popup">
    <div id="closePopup" onclick="closePopup()">X</div>
    <img src="" id="popupImg">
  </div>

  <!-- FINAL CLICKABLE EYE -->
  <img src="eye.png" id="finalEye" onclick="goToVisionary()">

  <script>
    const popup = document.getElementById('popup');
    const popupImg = document.getElementById('popupImg');
    const finalEye = document.getElementById('finalEye');

    let viewed = new Set();

    function openPopup(img, id) {
      popupImg.src = img.src;
      popup.style.display = 'block';
      popupImg.style.animation = 'glitch 0.2s infinite';
      viewed.add(id);
    }

    function closePopup() {
      popup.style.display = 'none';
      popupImg.style.animation = 'none';

      // If all 3 viewed → reveal final eye
      if(viewed.size === 3){
        finalEye.classList.add("show");
      }
    }

    function goToVisionary(){
      window.location.href = "visionary.html";
    }

    // Subtle eye movement
    setInterval(() => {
      document.querySelectorAll('.bg-eye').forEach(eye => {
        eye.style.top = (parseFloat(eye.style.top) + (Math.random()*2-1)) + "%";
        eye.style.left = (parseFloat(eye.style.left) + (Math.random()*2-1)) + "%";
      });
    }, 300);

  </script>

</body>
</html>
