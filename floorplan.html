<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Facility Floor Plans</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin:0;
      padding:0;
      background-color: black;
      font-family: 'Press Start 2P', monospace;
      overflow-x: hidden;
      color: white;
      text-align: center;
      position: relative;
    }

    h1 {
      margin-top: 20px;
      font-size: 30px;
      color: red;
      text-shadow: 1px 1px 2px white;
    }

    .floorplan {
      margin: 50px auto;
      width: 80%;
      max-width: 800px;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
    }

    /* Background eyes */
    .bg-eye {
      position: absolute;
      width: 60px;
      opacity: 0.2; /* make more visible */
      pointer-events: none;
      transition: all 0.3s;
    }

    /* Popup for clicked floor plan */
    #popup {
      position: fixed;
      top:50%;
      left:50%;
      transform: translate(-50%, -50%);
      display: none;
      background: rgba(0,0,0,0.95);
      padding: 10px;
      border: 2px solid red;
      z-index: 10;
    }

    #popup img {
      width: 90vw;
      max-width: 900px;
      animation: none;
      cursor: pointer;
    }

    /* Glitch effect animation */
    @keyframes glitch {
      0% { transform: translate(0,0); }
      20% { transform: translate(-2px,2px); }
      40% { transform: translate(2px,-2px); }
      60% { transform: translate(-1px,1px); }
      80% { transform: translate(1px,-1px); }
      100% { transform: translate(0,0); }
    }

    #closePopup {
      position: absolute;
      top:5px;
      right:10px;
      font-size: 18px;
      color: red;
      font-weight: bold;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <h1>Facility Floor Plans</h1>

  <!-- Floor plan images -->
  <img src="floorplan1.png" class="floorplan" alt="Floor Plan 1" onclick="openPopup(this)">
  <img src="floorplan2.png" class="floorplan" alt="Floor Plan 2" onclick="openPopup(this)">
  <img src="floorplan3.png" class="floorplan" alt="Floor Plan 3" onclick="openPopup(this)">

  <!-- Background eyes -->
  <img src="eye.png" class="bg-eye" style="top:10%; left:5%;">
  <img src="eye.png" class="bg-eye" style="top:50%; left:70%;">
  <img src="eye.png" class="bg-eye" style="top:80%; left:30%;">
  <img src="eye.png" class="bg-eye" style="top:30%; left:50%;">

  <!-- Popup for clicked floor plan -->
  <div id="popup">
    <div id="closePopup" onclick="closePopup()">X</div>
    <img src="" id="popupImg">
  </div>

  <script>
    const popup = document.getElementById('popup');
    const popupImg = document.getElementById('popupImg');
    const eyes = document.querySelectorAll('.bg-eye');

    // Open floor plan popup
    function openPopup(img) {
      popupImg.src = img.src;
      popup.style.display = 'block';
      popupImg.style.animation = 'glitch 0.3s infinite';
    }

    function closePopup() {
      popup.style.display = 'none';
      popupImg.style.animation = 'none';
    }

    // Slight random movement for eyes
    setInterval(() => {
      eyes.forEach(eye => {
        const top = parseFloat(eye.style.top);
        const left = parseFloat(eye.style.left);
        eye.style.top = `${Math.min(Math.max(top + (Math.random()*2-1),0),90)}%`;
        eye.style.left = `${Math.min(Math.max(left + (Math.random()*2-1),0),90)}%`;
      });
    }, 300);

  </script>
</body>
</html>
