<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Observation Logs</title>

  <!-- Rubik Glitch font -->
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #050505;
      color: #fff;
      font-family: 'Rubik Glitch', cursive;
      text-align: center;
      margin: 0;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 40px;
      text-shadow: 0 0 10px red;
    }

    .logfile {
      display: inline-block;
      margin: 25px;
      border: 2px solid #333;
      border-radius: 15px;
      overflow: hidden;
      width: 300px;
      height: 400px;
      cursor: pointer;
      transition: 0.3s;
    }

    .logfile:hover {
      border-color: red;
      transform: scale(1.05);
    }

    .logfile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Random background eyes */
    body::before, body::after, .eye1, .eye2, .eye3, .eye4 {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background-image: url('../eye.png');
      background-size: cover;
      opacity: 0.2;
      pointer-events: none;
    }

    body::before { top: 10%; left: 5%; }
    body::after { top: 60%; left: 85%; }
    .eye1 { top: 30%; left: 70%; }
    .eye2 { top: 80%; left: 40%; }
    .eye3 { top: 50%; left: 10%; }
    .eye4 { top: 20%; left: 90%; }

    /* Overlay */
    #overlay {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.95);
      display:none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
      font-size: 22px;
      color: #aaa;
    }

    #overlay img {
      max-width: 90%;
      max-height: 70%;
      margin-bottom: 20px;
      box-shadow: 0 0 20px red;
    }

    /* Final eye */
    .final-eye {
      margin-top: 80px;
      width: 120px;
      cursor: pointer;
      opacity: 0.6;
      transition: 0.3s;
    }

    .final-eye:hover {
      opacity: 1;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <!-- Eyes -->
  <div class="eye1"></div>
  <div class="eye2"></div>
  <div class="eye3"></div>
  <div class="eye4"></div>

  <h1>Observation Logs</h1>

  <!-- Logs -->
  <div class="logfile" onclick="openOverlay('log_001.png', 'Subject shows awareness.')">
    <img src="log_001.png">
  </div>

  <div class="logfile" onclick="openOverlay('log_002.png', 'It is not contained.')">
    <img src="log_002.png">
  </div>

  <div class="logfile" onclick="openOverlay('log_003.png', 'Overlook was never in control.')">
    <img src="log_003.png">
  </div>

  <!-- Overlay -->
  <div id="overlay" onclick="closeOverlay()">
    <img id="overlay-img">
    <div id="overlay-text"></div>
  </div>

  <!-- Final Eye (next step) -->
  <img src="../eye.png" class="final-eye" onclick="goNext()">

  <script>
    function openOverlay(src, text) {
      document.getElementById("overlay-img").src = src;
      document.getElementById("overlay-text").textContent = text;
      document.getElementById("overlay").style.display = "flex";
    }

    function closeOverlay() {
      document.getElementById("overlay").style.display = "none";
    }

    function goNext() {
      // CHANGE THIS later to your final page
      window.location.href = "../final.html";
    }
  </script>

</body>
</html>
