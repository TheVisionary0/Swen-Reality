<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Observation Logs</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      text-align: center;
      margin: 0;
      padding: 40px;
      overflow-x: hidden;
      position: relative;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 50px;
      text-shadow: 0 0 15px red;
    }

    .logfile, .newspaper {
      display: inline-block;
      margin: 30px;
      border: 2px solid #333;
      border-radius: 15px;
      overflow: hidden;
      width: 300px;
      height: 400px;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      z-index: 2;
    }

    .logfile:hover, .newspaper:hover {
      border-color: red;
      transform: scale(1.05);
    }

    .logfile img, .newspaper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay */
    #overlay {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.97);
      display:none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
      font-size: 20px;
      color: #ccc;
      padding: 20px;
    }

    #overlay img {
      max-width: 80%;
      max-height: 50%;
      margin-bottom: 20px;
      box-shadow: 0 0 25px red;
    }

    #overlay-text {
      margin-top: 15px;
      font-size: 16px;
      color: #999;
    }

    .closeBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 24px;
      color: white;
    }

    /* Background eyes */
    .bg-eye {
      position: absolute;
      width: 60px;
      opacity: 0.1;
      pointer-events: none;
    }

    /* Final eye */
    .final-eye {
      width: 80px;
      margin-top: 60px;
      opacity: 0.25;
      cursor: pointer;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

  </style>
</head>

<body>

  <!-- Background eyes -->
  <img src="../eye.png" class="bg-eye" style="top:10%; left:5%;">
  <img src="../eye.png" class="bg-eye" style="top:30%; left:70%;">
  <img src="../eye.png" class="bg-eye" style="top:60%; left:20%;">
  <img src="../eye.png" class="bg-eye" style="top:80%; left:50%;">
  <img src="../eye.png" class="bg-eye" style="top:40%; left:85%;">

  <h1>Observation Logs</h1>

  <!-- Log files -->
  <div class="logfile" onclick="openOverlay('log_001.png', 'Observation 001: Subject exhibits erratic behavior.', 'audio_001.mp3')">
    <img src="log_001.png">
  </div>

  <div class="logfile" onclick="openOverlay('log_002.png', 'Observation 002: Subject shows signs of distress.', 'audio_002.mp3')">
    <img src="log_002.png">
  </div>

  <div class="logfile" onclick="openOverlay('log_003.png', 'Observation 003: Subject is unresponsive.', 'audio_003.mp3')">
    <img src="log_003.png">
  </div>

  <!-- Newspapers -->
  <div class="newspaper" onclick="openOverlay('newspaper_001.png', 'Missing Person: Subject 004…', '')">
    <img src="newspaper_001.png">
  </div>

  <div class="newspaper" onclick="openOverlay('newspaper_002.png', 'Missing Person: Subject 015…', '')">
    <img src="newspaper_002.png">
  </div>

  <!-- Final visionary eye -->
  <img src="../eye.png" class="final-eye" onclick="goFinal()">

  <!-- Overlay -->
  <div id="overlay">
    <span class="closeBtn" onclick="closeOverlay()">X</span>
    <img id="overlay-img">
    <div id="overlay-text"></div>
    <audio id="overlay-audio" controls autoplay style="margin-top:20px;"></audio>
  </div>

  <script>
    function openOverlay(imgSrc, text, audioSrc) {
      document.getElementById('overlay-img').src = imgSrc;
      document.getElementById('overlay-text').textContent = text;

      const audio = document.getElementById('overlay-audio');
      if(audioSrc){
        audio.src = audioSrc;
        audio.play();
        audio.style.display = "block";
      } else {
        audio.pause();
        audio.src = "";
        audio.style.display = "none";
      }

      document.getElementById('overlay').style.display = 'flex';
    }

    function closeOverlay() {
      const audio = document.getElementById('overlay-audio');
      audio.pause();
      audio.currentTime = 0;
      document.getElementById('overlay').style.display = 'none';
    }

    function goFinal() {
      window.location.href = "../floorplan.html"; // replace with your final page URL
    }
  </script>

</body>
</html>
