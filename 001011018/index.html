<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Observation Logs</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      padding:0;
      background-color: black;
      font-family: 'Press Start 2P', monospace;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      font-size: 30px;
      color: red;
      text-shadow: 0 0 10px red;
    }

    h2 {
      margin-top: 50px;
      font-size: 20px;
      color: #aaa;
    }

    .item {
      width: 250px;
      margin: 30px;
      cursor: pointer;
      border: 2px solid #222;
      border-radius: 10px;
      transition: 0.2s;
    }

    .item:hover {
      border-color: red;
      transform: scale(1.05);
    }

    .bg-eye {
      position: absolute;
      width: 60px;
      opacity: 0.1;
      pointer-events: none;
    }

    /* Popup */
    #popup {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.95);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #popup img {
      max-width: 90%;
      max-height: 90%;
      animation: glitch 0.2s infinite;
    }

    #closeBtn {
      position: absolute;
      top:20px;
      right:30px;
      color: red;
      font-size: 30px;
      cursor: pointer;
    }

    @keyframes glitch {
      0% { transform: translate(0,0); }
      25% { transform: translate(-2px,2px); }
      50% { transform: translate(2px,-2px); }
      75% { transform: translate(-1px,1px); }
      100% { transform: translate(0,0); }
    }

    /* FINAL EYE */
    #finalEye {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      opacity: 0;
      cursor: pointer;
      transition: opacity 1s;
    }

    #finalEye.show {
      opacity: 0.8;
      animation: glitch 0.2s infinite;
    }

  </style>
</head>
<body>

  <h1>Observation Logs</h1>

  <!-- Logs -->
  <img src="log1.png" class="item" onclick="openPopup(this, 1)">
  <img src="log2.png" class="item" onclick="openPopup(this, 2)">
  <img src="log3.png" class="item" onclick="openPopup(this, 3)">

  <h2>Recovered Articles</h2>

  <!-- Newspapers -->
  <img src="newspaper_001.png" class="item" onclick="openPopup(this, 4)">
  <img src="newspaper_002.png" class="item" onclick="openPopup(this, 5)">

  <!-- Background eyes -->
  <img src="eye.png" class="bg-eye" style="top:10%; left:5%;">
  <img src="eye.png" class="bg-eye" style="top:40%; left:70%;">
  <img src="eye.png" class="bg-eye" style="top:70%; left:30%;">

  <!-- Popup -->
  <div id="popup" onclick="closePopup(event)">
    <span id="closeBtn" onclick="closePopup(event)">X</span>
    <img id="popupImg">
  </div>

  <!-- FINAL EYE -->
  <img src="eye.png" id="finalEye" onclick="goNext()">

  <script>
    const popup = document.getElementById("popup");
    const popupImg = document.getElementById("popupImg");
    const finalEye = document.getElementById("finalEye");

    let viewed = new Set();

    function openPopup(img, id){
      popup.style.display = "flex";
      popupImg.src = img.src;
      viewed.add(id);
    }

    function closePopup(event){
      if(event.target.id === "popup" || event.target.id === "closeBtn"){
        popup.style.display = "none";

        // check if ALL viewed
        if(viewed.size === 5){
          finalEye.classList.add("show");
        }
      }
    }

    function goNext(){
      window.location.href = "floorplan.html"; // next page
    }

    // eye movement
    const eyes = document.querySelectorAll('.bg-eye');
    setInterval(() => {
      eyes.forEach(eye => {
        const top = parseFloat(eye.style.top);
        const left = parseFloat(eye.style.left);
        eye.style.top = (top + (Math.random()*2-1)) + "%";
        eye.style.left = (left + (Math.random()*2-1)) + "%";
      });
    }, 300);

  </script>

</body>
</html>
