<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Case Files</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #050505;
      color: #fff;
      font-family: 'Creepster', cursive;
      text-align: center;
      margin: 0;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 50px;
      text-shadow: 0 0 10px red;
    }

    .casefile {
      display: inline-block;
      position: relative;
      margin: 30px;
      border: 2px solid #333;
      border-radius: 15px;
      overflow: hidden;
      width: 300px;
      height: 400px;
      transition: 0.3s;
      cursor: pointer;
    }

    .casefile:hover {
      border-color: red;
      transform: scale(1.05);
    }

    .casefile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    /* Random background eyes */
    body::before, body::after, div.eye1, div.eye2, div.eye3, div.eye4, div.eye5 {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background-image: url('eye.png');
      background-size: cover;
      opacity: 0.2;
      pointer-events: none;
    }
    body::before { top: 10%; left: 5%; }
    body::after { top: 50%; left: 80%; }
    div.eye1 { top: 70%; left: 20%; }
    div.eye2 { top: 30%; left: 60%; }
    div.eye3 { top: 80%; left: 50%; }
    div.eye4 { top: 15%; left: 75%; }
    div.eye5 { top: 40%; left: 35%; }

    /* Secret messages (dark grey but visible) */
    .secret {
      color: #222; /* super dark grey */
      font-size: 12px;
      margin-top: 10px;
    }

    /* Lightbox overlay for enlarging images */
    #overlay {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.9);
      display:none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    #overlay img {
      max-width: 90%;
      max-height: 90%;
      box-shadow: 0 0 20px red;
    }

  </style>
</head>
<body>

  <!-- Random eye divs -->
  <div class="eye1"></div>
  <div class="eye2"></div>
  <div class="eye3"></div>
  <div class="eye4"></div>
  <div class="eye5"></div>

  <h1>Case Files</h1>

  <div class="casefile" onclick="openOverlay('Case_001.png')">
    <img src="Case_001.png" alt="Case 001">
    <div class="secret">Message: Keep an eye on the patterns.</div>
  </div>

  <div class="casefile" onclick="openOverlay('Case_002.png')">
    <img src="Case_002.png" alt="Case 002">
    <div class="secret">Message: Put them in order, to move on.</div>
  </div>

  <div class="casefile" onclick="openOverlay('Case_003.png')">
    <img src="Case_003.png" alt="Case 003">
    <div class="secret">Message: Observe carefully, clues hidden in sight.</div>
  </div>

  <!-- Lightbox overlay -->
  <div id="overlay" onclick="closeOverlay()">
    <img id="overlay-img" src="">
  </div>

  <script>
    function openOverlay(src) {
      document.getElementById('overlay-img').src = src;
      document.getElementById('overlay').style.display = 'flex';
    }

    function closeOverlay() {
      document.getElementById('overlay').style.display = 'none';
    }
  </script>

</body>
</html>
