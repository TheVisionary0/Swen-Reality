<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Case Files</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #050505;
      color: #fff;
      font-family: 'Creepster', monospace;
      text-align: center;
      margin: 0;
      padding: 40px;
      background-image: url('eye.png'); /* optional background eyes image */
      background-repeat: repeat;
      background-size: 100px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 50px;
      text-shadow: 0 0 10px red;
    }

    .casefile {
      display: inline-block;
      position: relative;
      margin: 30px;
      border: 2px solid #333;
      border-radius: 15px;
      overflow: hidden;
      width: 300px;
      height: 400px;
      transition: 0.3s;
    }

    .casefile:hover {
      border-color: red;
      transform: scale(1.05);
    }

    .casefile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Optional creepy overlay if you want hover effects */
    .casefile::after {
      content: "";
      position: absolute;
      top:0;
      left:0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.1);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <h1>Case Files</h1>

  <div class="casefile">
    <img src="case_001.png" alt="Case 001">
  </div>

  <div class="casefile">
    <img src="case001 (1).png" alt="Case 002">
  </div>

  <div class="casefile">
    <img src="case001 (2).png" alt="Case 003">
  </div>

</body>
</html>
