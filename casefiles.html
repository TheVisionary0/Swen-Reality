<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Case Files</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #050505;
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      text-align: center;
      margin: 0;
      padding: 40px;
      position: relative;
      overflow-x: hidden;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 50px;
      text-shadow: 0 0 10px red;
    }

    /* Background eyes container */
    .bg-eyes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .bg-eyes img {
      position: absolute;
      width: 60px;
      opacity: 0.15;
    }

    /* Case files */
    .casefile {
      position: relative;
      z-index: 2;
      display: inline-block;
      margin: 30px;
      border: 2px solid #333;
      border-radius: 15px;
      overflow: hidden;
      width: 300px;
      height: 400px;
      cursor: pointer;
      transition: 0.3s;
    }

    .casefile:hover {
      border-color: red;
      transform: scale(1.03);
    }

    .casefile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay */
    #overlay {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.95);
      display:none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
      font-size: 26px;
      color: #ccc;
      padding: 20px;
    }

    #overlay img {
      max-width: 90%;
      max-height: 65%;
      margin-bottom: 30px;
      box-shadow: 0 0 20px red;
    }

    /* Secret eye (subtle now) */
    .secret-eye {
      width: 80px;
      margin-top: 80px;
      opacity: 0.25;
      cursor: pointer;
      z-index: 2;
      position: relative;
    }

    /* Popup */
    #secretBox {
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.95);
      display:none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .secretContent {
      background: #111;
      padding: 40px;
      border: 2px solid red;
      position: relative;
    }

    .closeBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 18px;
    }

    .secretContent h2 {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .secretContent input {
      padding: 15px;
      margin-top: 10px;
      background: black;
      color: white;
      border: 1px solid white;
      font-family: 'Press Start 2P', monospace;
    }

    .secretContent button {
      margin-top: 15px;
      padding: 10px;
      font-family: 'Press Start 2P', monospace;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <!-- BACKGROUND EYES -->
  <div class="bg-eyes">
    <img src="eye.png" style="top:10%; left:5%;">
    <img src="eye.png" style="top:30%; left:70%;">
    <img src="eye.png" style="top:60%; left:20%;">
    <img src="eye.png" style="top:80%; left:50%;">
    <img src="eye.png" style="top:40%; left:85%;">
    <img src="eye.png" style="top:75%; left:75%;">
  </div>

  <h1>Case Files</h1>

  <!-- Case files -->
  <div class="casefile" onclick="openOverlay('Case_001.png','PUT IN CODE')">
    <img src="Case_001.png">
  </div>

  <div class="casefile" onclick="openOverlay('Case_002.png','IN ORDER')">
    <img src="Case_002.png">
  </div>

  <div class="casefile" onclick="openOverlay('Case_003.png','TO CONTINUE')">
    <img src="Case_003.png">
  </div>

  <!-- Secret eye -->
  <img src="eye.png" class="secret-eye" onclick="openSecret()">

  <!-- Overlay -->
  <div id="overlay" onclick="closeOverlay()">
    <img id="overlay-img">
    <div id="overlay-text"></div>
  </div>

  <!-- Secret popup -->
  <div id="secretBox">
    <div class="secretContent">
      <span class="closeBtn" onclick="closeSecret()">X</span>
      <h2>ENTER CODE</h2>
      <input type="password" id="secretInput">
      <br>
      <button onclick="checkSecret()">ENTER</button>
    </div>
  </div>

  <script>
    function openOverlay(src, text) {
      document.getElementById("overlay-img").src = src;
      document.getElementById("overlay-text").textContent = text;
      document.getElementById("overlay").style.display = "flex";
    }

    function closeOverlay() {
      document.getElementById("overlay").style.display = "none";
    }

    function openSecret() {
      document.getElementById("secretBox").style.display = "flex";
    }

    function closeSecret() {
      document.getElementById("secretBox").style.display = "none";
    }

    function checkSecret() {
      const input = document.getElementById("secretInput");

      if (input.value === "001011018") {
        window.location.href = "001011018/";
      } else {
        input.value = "WRONG";
        input.style.color = "red";

        setTimeout(() => {
          input.value = "";
          input.style.color = "white";
        }, 1000);
      }
    }
  </script>

</body>
</html>
